<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body {
            font-family:Arial;
            background-color: #f0f8ff;
            text-align: center;
            padding-top:50px;
        }
        form {
            background-color: white;
            width: 350px;
            margin:auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, textarea{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

    </style>

</head>

<body>

    <h1>Contact Us</h1>

    <form method="POST">

        <input type="text"
               name="name"
               placeholder="Enter your name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter your email"
               required>

        <textarea name="message"
                  placeholder="Enter your message"
                  rows="5"
                  required></textarea>

        <button type="submit">Send Message</button>

    </form>

</body>
</html>
